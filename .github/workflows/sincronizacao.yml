# .github/workflows/sincronizacao.yml
name: Integrador Conta Azul Real-time

on:
  schedule:
    # Executa a cada 10 minutos (Cron gratuito do GitHub)
    - cron: '*/10 * * * *'
  
  # Cria um botão verde de "Play" para você forçar a execução no painel do GitHub na hora que desejar!
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v3

      - name: Instalar Python no Servidor do GitHub
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências da API do Supabase e Conta Azul
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Rodar script de atualização em tempo real
        env:
          # Segredos guardados de forma forte nos segredos do próprio GitHub
          CONTAAZUL_CLIENT_ID: ${{ secrets.CONTAAZUL_CLIENT_ID }}
          CONTAAZUL_CLIENT_SECRET: ${{ secrets.CONTAAZUL_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sincronizador.py
